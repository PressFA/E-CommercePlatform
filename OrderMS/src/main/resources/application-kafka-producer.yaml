spring:
  kafka:
    producer:
      bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS}
      transaction-id-prefix: order-ms-${HOSTNAME:local}- # Для корректной работы Kafka Transaction
      acks: all # Одно из условий для Idempotence Producer
      retries: 10
      properties:
        enable.idempotence: true # Явно включаем Idempotence Producer
        max.in.flight.requests.per.connection: 5 # Одно из условий для Idempotence Producer
        retry.backoff.ms: 1000
        delivery.timeout.ms: 60000
        linger.ms: 0
        request.timeout.ms: 30000