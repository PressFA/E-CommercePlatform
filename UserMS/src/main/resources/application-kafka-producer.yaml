spring:
  kafka:
    producer:
      bootstrap-servers: localhost:9092,localhost:9094,localhost:9096
      transaction-id-prefix: user-ms-${HOSTNAME:local}- # Для корректной работы Kafka Transaction
      acks: all # Одно из условий для Idempotence Producer
      properties:
        enable.idempotence: true # Явно включаем Idempotence Producer
        max.in.flight.requests.per.connection: 5 # Одно из условий для Idempotence Producer

user:
  events:
    topic:
      name: user-events
      partitions: 3
      replicas: 3
      min:
        insync:
          replicas: 2